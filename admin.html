<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantichy — Admin Panel</title>
<meta name="theme-color" content="#0F172A">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@600;700;800;900&display=swap');
:root {
  --navy: #001f5c;
  --dark: #0F172A;
  --fh: 'Montserrat', sans-serif;
  --fb: 'Inter', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--fb); background: #F1F5F9; min-height: 100vh; }

.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px; background: white; border-radius: 12px; border: 1px solid #E2E8F0;
  margin-bottom: 20px;
}
.header h1 { font-family: var(--fh); font-size: 20px; color: var(--dark); }
.header button {
  padding: 8px 14px; border-radius: 8px; border: 1px solid #E2E8F0;
  background: white; color: #64748B; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--fb); transition: all .15s;
}
.header button:hover { background: #F8FAFC; border-color: #CBD5E1; }

.auth-box {
  background: white; border-radius: 12px; border: 1px solid #E2E8F0;
  padding: 24px; margin-bottom: 20px; max-width: 400px;
}
.auth-box h2 { font-family: var(--fh); font-size: 16px; margin-bottom: 16px; color: var(--dark); }
.auth-box input {
  width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #E2E8F0;
  border-radius: 8px; font-size: 13px; font-family: var(--fb);
}
.auth-box button {
  width: 100%; padding: 12px; background: var(--navy); color: white;
  border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: var(--fb);
}
.auth-box button:hover { opacity: .9; }
.error { color: #DC2626; font-size: 12px; margin-bottom: 12px; }

.payments-list { background: white; border-radius: 12px; border: 1px solid #E2E8F0; overflow: hidden; }
.payment-row {
  display: grid; grid-template-columns: 2fr 1.2fr 1fr 1fr; gap: 16px; padding: 14px 18px;
  border-bottom: 1px solid #F1F5F9; align-items: center;
}
.payment-row:last-child { border-bottom: none; }
.payment-header { background: #F8FAFC; font-weight: 700; font-size: 12px; color: #64748B; text-transform: uppercase; letter-spacing: .05em; }
.payment-email { font-family: 'Space Mono', monospace; font-size: 11px; color: #334155; word-break: break-all; }
.payment-plan { font-weight: 600; color: var(--dark); }
.payment-amount { color: #64748B; font-size: 13px; }
.btn-approve {
  padding: 6px 12px; border-radius: 6px; border: none;
  background: #10B981; color: white; font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: var(--fb); transition: all .15s;
}
.btn-approve:hover { background: #059669; }
.btn-approve:disabled { background: #D1FAE5; cursor: not-allowed; }

.loading, .empty, .error-msg {
  padding: 20px; text-align: center; color: #64748B; font-size: 13px;
}
.loading { color: #94A3B8; }
.empty { color: #10B981; }
.error-msg { color: #DC2626; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; }

.success-badge {
  display: inline-block; padding: 4px 8px; background: #F0FDF4; color: #15803D;
  border-radius: 4px; font-size: 11px; font-weight: 600;
}

@media (max-width: 768px) {
  .payment-row { grid-template-columns: 1fr; }
  .payment-header { display: none; }
  .payment-row::before { content: attr(data-label); font-weight: 700; font-size: 11px; color: #64748B; display: block; margin-bottom: 4px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Auth section -->
  <div id="auth-section" style="display:none">
    <div class="auth-box">
      <h2>Admin Sign In</h2>
      <div id="auth-error" class="error"></div>

      <!-- Google Sign In -->
      <button onclick="adminSignInGoogle()" style="width:100%;padding:12px;border-radius:8px;border:1px solid #E2E8F0;background:white;color:#334155;font-weight:600;cursor:pointer;font-family:var(--fb);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;transition:all .15s" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background='white'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="flex:1;height:1px;background:#E2E8F0"></div>
        <span style="color:#94A3B8;font-size:12px">or</span>
        <div style="flex:1;height:1px;background:#E2E8F0"></div>
      </div>

      <!-- Email/Password fallback -->
      <input type="email" id="admin-email" placeholder="Email" style="margin-bottom:8px">
      <input type="password" id="admin-password" placeholder="Password">
      <button onclick="adminSignIn()" style="width:100%;padding:12px;background:var(--navy);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:var(--fb);margin-top:12px">Sign In with Email</button>
    </div>
  </div>

  <!-- Admin section -->
  <div id="admin-section" style="display:none">
    <div class="header">
      <h1>⚙️ Payment Approvals</h1>
      <button onclick="adminSignOut()">Sign Out</button>
    </div>

    <div id="payments-container">
      <div class="loading">Loading payments...</div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FB = {
  apiKey: "AIzaSyAsbf6f71SDOnRWojv70IkApiRakupC5XQ",
  authDomain: "quant-dashboard-1405b.firebaseapp.com",
  projectId: "quant-dashboard-1405b"
};

let _adminUser = null;
let _db = null;

firebase.initializeApp(FB);

/* Configure Google provider */
const googleProvider = new firebase.auth.GoogleAuthProvider();
googleProvider.addScope('profile');
googleProvider.addScope('email');

/* Check auth on load */
firebase.auth().onAuthStateChanged(user => {
  if(user) {
    _adminUser = user;
    _db = firebase.firestore();
    showAdminSection();
    loadPayments();
  } else {
    _adminUser = null;
    showAuthSection();
  }
});

function showAuthSection() {
  document.getElementById('auth-section').style.display = 'block';
  document.getElementById('admin-section').style.display = 'none';
}

function showAdminSection() {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('admin-section').style.display = 'block';
}

window.adminSignInGoogle = async function() {
  const errEl = document.getElementById('auth-error');
  try {
    await firebase.auth().signInWithPopup(googleProvider);
  } catch(e) {
    errEl.textContent = 'Google sign in failed: ' + (e.message || 'Unknown error');
  }
};

window.adminSignIn = async function() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value.trim();
  const errEl = document.getElementById('auth-error');

  if(!email || !password) {
    errEl.textContent = 'Please enter email and password.';
    return;
  }

  try {
    await firebase.auth().signInWithEmailAndPassword(email, password);
  } catch(e) {
    errEl.textContent = 'Sign in failed: ' + (e.message || 'Unknown error');
  }
};

window.adminSignOut = async function() {
  try {
    await firebase.auth().signOut();
  } catch(e) {
    console.error('Sign out error:', e);
  }
};

function loadPayments() {
  const container = document.getElementById('payments-container');
  container.innerHTML = '<div class="loading">Loading payments...</div>';

  _db.collection('payments')
    .where('status', '==', 'pending')
    .orderBy('timestamp', 'desc')
    .onSnapshot(snap => {
      if(snap.empty) {
        container.innerHTML = '<div class="empty">✓ No pending payments</div>';
        return;
      }

      let html = '<div class="payments-list">'
        + '<div class="payment-row payment-header">'
        + '<div>Email</div><div>Plan</div><div>Amount</div><div>Action</div>'
        + '</div>';

      snap.forEach(doc => {
        const data = doc.data();
        html += '<div class="payment-row" data-uid="' + data.uid + '">'
          + '<div class="payment-email">' + (data.email || '(no email)') + '</div>'
          + '<div class="payment-plan">' + (data.planName || data.plan || '?') + '</div>'
          + '<div class="payment-amount">$' + (data.amount || '0') + '</div>'
          + '<div style="display:flex;gap:6px">'
          + '<button class="btn-approve" onclick="approvePayment(\'' + data.uid + '\', this)">Approve</button>'
          + '<button style="padding:6px 10px;border-radius:6px;border:1px solid #FECACA;background:#FEF2F2;color:#DC2626;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--fb);transition:all .15s" onmouseover="this.style.background=\'#FECACA\';this.style.color=\'white\'" onmouseout="this.style.background=\'#FEF2F2\';this.style.color=\'#DC2626\'" onclick="rejectPayment(\'' + data.uid + '\', this)">Unpaid</button>'
          + '</div>'
          + '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }, err => {
      container.innerHTML = '<div class="error-msg">Error loading payments: ' + err.message + '</div>';
    });
}

window.approvePayment = async function(uid, btn) {
  btn.disabled = true;
  btn.textContent = 'Approving…';

  try {
    const batch = _db.batch();

    /* Get the payment doc to get plan info */
    const payDoc = await _db.collection('payments').doc(uid).get();
    const payData = payDoc.data();

    /* Update user plan */
    const userRef = _db.collection('users').doc(uid);
    batch.update(userRef, { plan: payData.plan });

    /* Mark payment as approved */
    const payRef = _db.collection('payments').doc(uid);
    batch.update(payRef, {
      status: 'approved',
      approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
      approvedBy: _adminUser.email
    });

    await batch.commit();

    btn.innerHTML = '✓ Approved';
    btn.style.background = '#D1FAE5';
    btn.style.color = '#15803D';
    btn.style.cursor = 'default';

  } catch(err) {
    console.error('Approval error:', err);
    btn.disabled = false;
    btn.textContent = 'Approve';
    alert('Error: ' + err.message);
  }
};

window.rejectPayment = async function(uid, btn) {
  if (!confirm('Mark this payment as unpaid? User will need to pay again.')) return;

  btn.disabled = true;
  btn.textContent = 'Rejecting…';

  try {
    const batch = _db.batch();

    /* Clear user plan — back to free */
    const userRef = _db.collection('users').doc(uid);
    batch.update(userRef, { plan: 'free' });

    /* Mark payment as unpaid */
    const payRef = _db.collection('payments').doc(uid);
    batch.update(payRef, {
      status: 'unpaid',
      rejectedAt: firebase.firestore.FieldValue.serverTimestamp(),
      rejectedBy: _adminUser.email
    });

    await batch.commit();

    btn.innerHTML = '✗ Unpaid';
    btn.style.background = '#FEF2F2';
    btn.style.color = '#DC2626';
    btn.style.cursor = 'default';

  } catch(err) {
    console.error('Rejection error:', err);
    btn.disabled = false;
    btn.textContent = 'Unpaid';
    alert('Error: ' + err.message);
  }
};
</script>

</body>
</html>
