[build]
  publish = "."

[build.processing.html]
  pretty_urls = true

# Security headers for Firebase Auth Popups
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

# Exempt static assets from root redirect
[[redirects]]
  from = "/*.png"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/*.svg"
  to = "/:splat"
  status = 200

# Serve landing page at root URL
[[redirects]]
  from = "/"
  to = "/landing"
  status = 200
  force = true

# Keep /app as clean URL for the dashboard
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

# Pricing page
[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

# Payment page
[[redirects]]
  from = "/pay"
  to = "/payment.html"
  status = 200

# Proxy Firebase Auth calls to the real Firebase project
[[redirects]]
  from = "/__/auth/*"
  to = "https://quant-dashboard-1405b.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__/firebase/*"
  to = "https://quant-dashboard-1405b.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true
